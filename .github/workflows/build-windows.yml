name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Test
        run: go test ./...
      - name: Build Windows executable
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/mega-feirao.exe .
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: mega-feirao-windows
          path: dist/mega-feirao.exe
          if-no-files-found: error
